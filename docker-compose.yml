services:
  gmaps-scraper:
    image: gosom/google-maps-scraper:latest
    container_name: gmaps-scraper
    expose:
      - "8080"
    networks:
      - web
    volumes:
      - ./gmapsdata:/gmapsdata
    command: ["-addr", ":8080", "-data-folder", "/gmapsdata", "-email"]
    restart: unless-stopped

  frontend:
    image: nginx:stable-alpine
    container_name: gmaps-frontend
    expose:
      - "80"
    networks:
      - web
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gmapsdata:/usr/share/nginx/html/gmapsdata:ro
    depends_on:
      - gmaps-scraper
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: gmaps-backend
    expose:
      - "8000"
    networks:
      - web
    environment:
      - GOOGLE_SHEET_WEB_APP_URL=${GOOGLE_SHEET_WEB_APP_URL:-}
    restart: unless-stopped

networks:
  web:
    external: true

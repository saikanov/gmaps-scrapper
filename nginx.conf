server {
    listen 80;
    server_name saikanov.com www.saikanov.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name saikanov.com www.saikanov.com;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://gmaps-scraper:8080/api/;
    }
}